<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <h1>WebAppSec Taint Analyzer</h1>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div id="filterBar" class="filter-bar hidden"></div>

  <div id="findings" class="findings-list"></div>

  <div id="actionBar" class="action-bar hidden">
    <button id="clearBtn" class="action-btn clear-btn">Clear All</button>
    <button id="exportBtn" class="action-btn export-btn">Export JSON</button>
  </div>

  <div id="empty" class="empty">No findings yet. Navigate to a page to begin analysis.</div>

  <script src="popup.js"></script>
</body>
</html>
